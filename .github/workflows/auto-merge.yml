name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pages: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge Claude branch into main
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Merging $BRANCH into main"
          git fetch origin "$BRANCH"
          git merge --no-ff "origin/$BRANCH" -m "Auto-merge $BRANCH"
          git push origin main

      - name: Pages-Deployment anstoßen
        # Ein Push per GITHUB_TOKEN loest keine weiteren Workflows aus (GitHubs
        # Loop-Schutz) - daher wird das "pages build and deployment" nach einem
        # Auto-Merge NICHT automatisch gestartet und die Live-Seite bliebe alt.
        # Dieser explizite API-Aufruf fordert das Pages-Build des aktuellen main an.
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds"
